name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build & Test
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties','**/*.gradle*','**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Grant execute for gradlew
        run: chmod +x ./gradlew
      - name: Build and run tests
        run: ./gradlew build --no-daemon
      # build job does not publish artifacts; Docker image will be built in the `docker` job

  docker:
    name: Build & Push Docker Image
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute image tag
        id: tag
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          V=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${V}"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-flags: --debug
      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vellaris:latest,ghcr.io/${{ github.repository_owner }}/vellaris:${{ steps.tag.outputs.tag }},ghcr.io/${{ github.repository_owner }}/vellaris:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Upload image info
        run: echo "ghcr.io/${{ github.repository_owner }}/vellaris:${{ steps.tag.outputs.tag }}" > image.txt
      - uses: actions/upload-artifact@v4
        with:
          name: image-info
          path: image.txt

  release:
    name: Create Release
    needs: [build, docker]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute image tag
        id: tag
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          V=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${V}"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
      - name: Compose release body
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/vellaris:${{ steps.tag.outputs.tag }}"
          echo "Automated release from CI" > release_body.md
          echo "" >> release_body.md
          echo "Docker image: https://ghcr.io/${{ github.repository_owner }}/vellaris" >> release_body.md
          echo "Image: $IMAGE" >> release_body.md
        shell: bash
      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          commit: ${{ github.sha }}
          name: Release ${{ steps.tag.outputs.tag }}
          bodyFile: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
