name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties','**/*.gradle*','**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Grant execute for gradlew
        run: chmod +x ./gradlew
      - name: Build and run tests
        run: ./gradlew build --no-daemon
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nortantis-build
          path: build/libs/**/*.jar

  docker:
    name: Build & Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nortantis:latest,ghcr.io/${{ github.repository_owner }}/nortantis:${{ github.sha }}
      - name: Upload image info
        run: echo "image=ghcr.io/${{ github.repository_owner }}/nortantis:latest" > image.txt
      - uses: actions/upload-artifact@v4
        with:
          name: image-info
          path: image.txt

  release:
    name: Create Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nortantis-build
      - name: Compute release tag
        id: tag
        run: |
          echo "tag=v$(date +'%Y%m%d')-r${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
      - name: Create GitHub release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          commit: ${{ github.sha }}
          name: Release ${{ steps.tag.outputs.tag }}
          artifacts: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
