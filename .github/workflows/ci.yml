name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties','**/*.gradle*','**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Grant execute for gradlew
        run: chmod +x ./gradlew
      - name: Build and run tests
        run: ./gradlew build --no-daemon
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vellaris-build
          path: build/libs/**/*.jar

  docker:
    name: Build & Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vellaris:latest,ghcr.io/${{ github.repository_owner }}/vellaris:${{ github.sha }}
      - name: Upload image info
        run: echo "ghcr.io/${{ github.repository_owner }}/vellaris:latest" > image.txt
      - uses: actions/upload-artifact@v4
        with:
          name: image-info
          path: image.txt

  release:
    name: Create Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vellaris-build
      - name: Download image info
        uses: actions/download-artifact@v4
        with:
          name: image-info
      - name: Compose release body
        run: |
          IMAGE=$(cat image.txt 2>/dev/null || echo "ghcr.io/${{ github.repository_owner }}/vellaris:latest")
          echo "Automated release from CI" > release_body.md
          echo "" >> release_body.md
          echo "Docker image: https://ghcr.io/${{ github.repository_owner }}/vellaris" >> release_body.md
          echo "Image tag: $IMAGE" >> release_body.md
        shell: bash
      - name: Compute release tag
        id: tag
        run: |
          # Fetch tags and determine latest semver tag (vMAJOR.MINOR.PATCH)
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          V=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$V"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Computed new tag: $NEW_TAG"
      - name: Create GitHub release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          commit: ${{ github.sha }}
          name: Release ${{ steps.tag.outputs.tag }}
          artifacts: build/libs/*.jar
          bodyFile: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag to remote
        if: always()
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG" || echo "tag exists"
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} "$TAG" || echo "push failed"
        shell: bash
