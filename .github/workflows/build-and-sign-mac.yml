name: Build and Sign Mac Installer

on:
  push:
    branches:
      - release

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK
      uses: actions/setup-java@v2
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Get Version
      run: |
        version=$(cat installers/version.txt)
        echo "VERSION=$version" >> $GITHUB_ENV

    - name: Import Certificate into Temporary Keychain
      env:
        MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      run: |
        echo "$MACOS_CERTIFICATE_P12" | base64 --decode -o certificate.p12

        security create-keychain -p "temp-keychain-password" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "temp-keychain-password" build.keychain
        security set-keychain-settings -lut 21600 build.keychain

        security import certificate.p12 \
          -k build.keychain \
          -P "$MACOS_CERTIFICATE_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/productbuild
        security set-key-partition-list \
          -S apple-tool:,apple: \
          -s -k "temp-keychain-password" build.keychain

        rm -f certificate.p12

    - name: Build Mac Installer
      env:
        MACOS_SIGNING_IDENTITY: "Developer ID Application: Joseph Heydorn (${{ secrets.APPLE_TEAM_ID }})"
      run: |
        cd installers
        bash create_mac_installer.sh

    - name: Notarize Installer
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      run: |
        xcrun notarytool submit "installers/Nortantis-${{ env.VERSION }}.pkg" \
          --apple-id "$APPLE_ID" \
          --team-id "$APPLE_TEAM_ID" \
          --password "$APPLE_APP_SPECIFIC_PASSWORD" \
          --wait

    - name: Staple Notarization Ticket
      run: |
        xcrun stapler staple "installers/Nortantis-${{ env.VERSION }}.pkg"

    - name: Clean up Keychain
      if: always()
      run: security delete-keychain build.keychain

    - name: Upload Signed Mac Installer
      uses: actions/upload-artifact@v4
      with:
        name: mac-installer.zip
        path: installers/Nortantis-${{ env.VERSION }}.pkg
