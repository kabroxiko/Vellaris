# SonarQube project configuration for Nortantis
# Edit `sonar.projectKey` and optionally set `sonar.host.url` and `sonar.login` when running scans.
sonar.projectKey=vellaris
sonar.projectName=Vellaris
sonar.projectVersion=1.0

# Sources and tests
# Keep sources and tests disjoint: tests live under the same folder
# but are identified by filename patterns. Exclude test files from
# `sonar.sources` and include them via `sonar.tests` / `sonar.test.inclusions`.
sonar.sources=web/src
sonar.tests=web/src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx
# sonar.test.exclusions=web/src/main.jsx

# Exclude test files from the main sources to avoid double-indexing
sonar.exclusions=**/build/**,**/out/**,**/node_modules/**,**/public/**,**/assets/**,web/src/**/*.test.js,web/src/**/*.test.jsx,web/src/**/*.spec.js,web/src/**/*.spec.jsx

# Frontend coverage (Vitest produces lcov at web/coverage/lcov.info)
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

# Exclude specific files from coverage reporting only (keep them in general analysis)
sonar.coverage.exclusions=web/src/main.jsx

# Java binaries and libraries (Gradle build output)
sonar.java.binaries=build/classes
sonar.java.libraries=libraries/**

# Encoding
sonar.sourceEncoding=UTF-8

# Optional: uncomment and set your SonarQube server and token, or supply via CLI
# sonar.host.url=https://sonarqube.example.com
# sonar.login=YOUR_TOKEN
