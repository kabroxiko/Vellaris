# SonarQube project configuration for Nortantis
# Edit `sonar.projectKey` and optionally set `sonar.host.url` and `sonar.login` when running scans.
sonar.projectKey=vellaris
sonar.projectName=Vellaris
sonar.projectVersion=1.0

# Sources and tests
sonar.sources=src
sonar.tests=test

# Java binaries and libraries (Gradle build output)
sonar.java.binaries=build/classes
sonar.java.libraries=libs/**,libraries/**

# Encoding
sonar.sourceEncoding=UTF-8

# Common exclusions
sonar.exclusions=**/build/**,**/out/**,**/node_modules/**,**/public/**,**/assets/**

# Optional: uncomment and set your SonarQube server and token, or supply via CLI
# sonar.host.url=https://sonarqube.example.com
# sonar.login=YOUR_TOKEN
