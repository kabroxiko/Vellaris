# SonarQube project configuration for Nortantis
# Edit `sonar.projectKey` and optionally set `sonar.host.url` and `sonar.login` when running scans.
sonar.projectKey=vellaris
sonar.projectName=Vellaris
sonar.projectVersion=1.0

# Sources and tests
# Keep sources and tests disjoint: tests live under the same folder
# but are identified by filename patterns. Exclude test files from
# `sonar.sources` and include them via `sonar.tests` / `sonar.test.inclusions`.
sonar.sources=.
sonar.tests=web/src,test/nortantis/api
sonar.test.inclusions=**/__test__/**

# Exclude test files from the main sources to avoid double-indexing
sonar.exclusions=**/build/**,**/out/**,**/node_modules/**,**/public/**,**/assets/**,web/src/**/*.test.js,web/src/**/*.test.jsx,web/src/**/*.spec.js,web/src/**/*.spec.jsx,src/nortantis/*.java,src/nortantis/swing/**,src/nortantis/platform/**,src/nortantis/editor/**,src/nortantis/cli/**,src/nortantis/geom/**,src/nortantis/graph/**,src/nortantis/util/**,test/nortantis/*.java,test/nortantis/swing/**,test/nortantis/platform/**,test/nortantis/editor/**,test/nortantis/cli/**,test/nortantis/geom/**,test/nortantis/graph/**,test/nortantis/util/**,test/nortantis/test/**

# Frontend coverage (Vitest produces lcov at web/coverage/lcov.info)
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Exclude specific files from coverage reporting only (keep them in general analysis)
sonar.coverage.exclusions=web/src/main.jsx

# Java binaries and libraries (Gradle build output)
sonar.java.binaries=build/classes
sonar.java.libraries=.gradle/caches

# Encoding
sonar.sourceEncoding=UTF-8

# Optional: uncomment and set your SonarQube server and token, or supply via CLI
# sonar.host.url=https://sonarqube.example.com
# sonar.login=YOUR_TOKEN

# Optional: if you have a dependency-check report, specify its path to import vulnerabilities
sonar.dependencyCheck.jsonReportPath=.sonar/dependency-check-report.json
sonar.dependencyCheck.htmlReportPath=.sonar/dependency-check-report.html
sonar.dependencyCheck.summarize=true

# Exclude i18n label files from duplication (CPD) checks
sonar.cpd.exclusions=web/src/i18n/labels/**
